<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NourishAI — Track meals, understand your habits, and get practical nutrition insights. Simple, fast, and private." />
    <meta name="keywords" content="nutrition tracker, food journal, health companion, meal tracker, calorie counter" />
    <meta name="author" content="NourishAI" />
    <meta name="theme-color" content="#FF4D8D" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Open Graph -->
    <meta property="og:title" content="NourishAI — Track Meals, Eat Smarter" />
    <meta property="og:description" content="Simple nutrition tracking with real USDA data and practical insights." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nourish-ai.vercel.app" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NourishAI — Eat Smarter, Live Better" />
    <meta name="twitter:description" content="Nutrition tracking with real data and practical insights." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Performance: Preconnect to font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>NourishAI — Track Meals, Eat Smarter</title>
  </head>
  <body>
    <noscript>
      <p style="padding: 2rem; text-align: center; font-family: system-ui;">
        NourishAI requires JavaScript to run. Please enable JavaScript in your browser settings.
      </p>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
